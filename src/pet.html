<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  user-select: none;
  -webkit-app-region: drag;
}

.pet-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.pet {
  width: 96px;
  height: 96px;
  position: relative;
}

.pet-body {
  width: 80px;
  height: 80px;
  margin: 0 auto;
  position: relative;
}

.skin-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 80px;
  height: 80px;
  object-fit: contain;
  -webkit-user-drag: none;
  transition: opacity 0.3s ease, filter 0.3s ease;
}

/* Status label */
.status-label {
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  background: rgba(13, 148, 136, 0.85);
  padding: 2px 8px;
  border-radius: 8px;
  margin-top: 4px;
  white-space: nowrap;
  text-align: center;
  backdrop-filter: blur(4px);
  -webkit-app-region: no-drag;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* === STATE ANIMATIONS === */

.state-idle .skin-img { animation: float 3s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.state-busy .skin-img { animation: bounce 0.6s ease-in-out infinite; }
@keyframes bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.02); }
}

.state-thinking .skin-img { animation: think-pulse 2s ease-in-out infinite; }
@keyframes think-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.state-stuck .skin-img { animation: wobble 0.5s ease-in-out infinite; }
@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); }
}

.state-waiting .skin-img { animation: wait-bounce 1.5s ease-in-out infinite; }
@keyframes wait-bounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
  60% { transform: translateY(0); }
}

.state-offline .skin-img { opacity: 0.8; filter: saturate(0.5); }
.state-offline .pet-body { animation: sleep-bob 4s ease-in-out infinite; }
.state-offline .zzz { display: block; }
@keyframes sleep-bob {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(2px) rotate(-2deg); }
}

/* Zzz indicator */
.zzz {
  display: none;
  position: absolute;
  top: -8px;
  right: 4px;
  font-size: 14px;
  animation: zzz-float 2s ease-in-out infinite;
}
@keyframes zzz-float {
  0% { opacity: 0; transform: translateY(0) scale(0.8); }
  50% { opacity: 1; transform: translateY(-8px) scale(1); }
  100% { opacity: 0; transform: translateY(-16px) scale(0.8); }
}

/* Context gauge ring */
.context-ring {
  position: absolute;
  width: 88px;
  height: 88px;
  top: -4px;
  left: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  transition: border-color 0.5s;
}
.context-high .context-ring {
  border-color: rgba(251, 146, 60, 0.6);
  animation: ring-pulse 1.5s ease-in-out infinite;
}
.context-critical .context-ring {
  border-color: rgba(239, 68, 68, 0.7);
  animation: ring-pulse 0.8s ease-in-out infinite;
}
@keyframes ring-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="pet-container">
  <div class="pet state-idle" id="pet">
    <div class="pet-body">
      <div class="context-ring"></div>
      <img class="skin-img" id="skin-img" alt="">
      <div class="zzz">💤</div>
    </div>
  </div>
  <div class="status-label" id="status-label">Connecting...</div>
</div>

<script>
const { ipcRenderer } = require('electron');

let agentName = '';
let skinImages = null;
let sounds = {};
let soundEnabled = true;
let currentStateKey = null;
let currentImgState = null;
let lastSoundAt = 0;

const SOUND_GAP_MS = 4000;

ipcRenderer.on('init', (_, data) => {
  agentName = data.agentName || '';
  skinImages = data.skinImages || null;
  sounds = data.sounds || {};
  soundEnabled = data.soundEnabled !== false;
  applySkinImage(currentStateKey || 'idle');
  updateLabel(agentName || 'Connecting...');
});

ipcRenderer.on('skin', (_, images) => {
  skinImages = images || null;
  currentImgState = null;
  applySkinImage(currentStateKey || 'idle');
});

ipcRenderer.on('sound-enabled', (_, enabled) => {
  soundEnabled = Boolean(enabled);
});

ipcRenderer.on('state', (_, { stateKey, label, contextPct }) => {
  const pet = document.getElementById('pet');
  const prev = currentStateKey;

  pet.className = 'pet state-' + stateKey;
  if (contextPct > 80) pet.classList.add('context-critical');
  else if (contextPct > 60) pet.classList.add('context-high');

  applySkinImage(stateKey);
  updateLabel(label);
  maybePlaySound(prev, stateKey);
  currentStateKey = stateKey;
});

function applySkinImage(stateKey) {
  if (!skinImages || !skinImages[stateKey]) return;
  if (currentImgState !== stateKey) {
    currentImgState = stateKey;
    document.getElementById('skin-img').src = skinImages[stateKey];
  }
}

function maybePlaySound(prev, next) {
  if (!soundEnabled || prev === null || prev === next) return;

  let name = null;
  if (next === 'stuck') name = 'stuck';
  else if (next === 'waiting') name = 'waiting';
  else if (next === 'idle' && (prev === 'busy' || prev === 'thinking')) name = 'done';
  if (!name || !sounds[name]) return;

  const now = Date.now();
  if (now - lastSoundAt < SOUND_GAP_MS) return;
  lastSoundAt = now;

  const audio = new Audio(sounds[name]);
  audio.volume = 0.4;
  audio.play().catch(() => {});
}

function updateLabel(text) {
  document.getElementById('status-label').textContent = text;
}
</script>
</body>
</html>
