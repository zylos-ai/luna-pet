<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  user-select: none;
  -webkit-app-region: drag;
}

.pet-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
}

.pet {
  width: 96px;
  height: 96px;
  position: relative;
}

.pet-body {
  width: 80px;
  height: 80px;
  margin: 0 auto;
  position: relative;
}

.skin-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 80px;
  height: 80px;
  object-fit: contain;
  -webkit-user-drag: none;
  transition: opacity 0.3s ease, filter 0.3s ease;
}

/* Status label */
.status-label {
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.9);
  background: rgba(13, 148, 136, 0.85);
  padding: 2px 8px;
  border-radius: 8px;
  margin-top: 4px;
  white-space: nowrap;
  text-align: center;
  backdrop-filter: blur(4px);
  -webkit-app-region: no-drag;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* === STATE ANIMATIONS === */

.state-idle .skin-img { animation: float 3s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.state-busy .skin-img { animation: bounce 0.6s ease-in-out infinite; }
@keyframes bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-8px) scale(1.02); }
}

.state-thinking .skin-img { animation: think-pulse 2s ease-in-out infinite; }
@keyframes think-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.04); }
}

.state-stuck .skin-img { animation: wobble 0.5s ease-in-out infinite; }
@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); }
}

.state-waiting .skin-img { animation: wait-bounce 1.5s ease-in-out infinite; }
@keyframes wait-bounce {
  0%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
  60% { transform: translateY(0); }
}

.state-offline .skin-img { opacity: 0.8; filter: saturate(0.5); }
.state-offline .pet-body { animation: sleep-bob 4s ease-in-out infinite; }
.state-offline .zzz { display: block; }
@keyframes sleep-bob {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(2px) rotate(-2deg); }
}

/* Zzz indicator */
.zzz {
  display: none;
  position: absolute;
  top: -8px;
  right: 4px;
  font-size: 14px;
  animation: zzz-float 2s ease-in-out infinite;
}
@keyframes zzz-float {
  0% { opacity: 0; transform: translateY(0) scale(0.8); }
  50% { opacity: 1; transform: translateY(-8px) scale(1); }
  100% { opacity: 0; transform: translateY(-16px) scale(0.8); }
}

/* Context gauge ring */
.context-ring {
  position: absolute;
  width: 88px;
  height: 88px;
  top: -4px;
  left: -4px;
  border-radius: 50%;
  border: 2px solid transparent;
  transition: border-color 0.5s;
}
.context-high .context-ring {
  border-color: rgba(251, 146, 60, 0.6);
  animation: ring-pulse 1.5s ease-in-out infinite;
}
.context-critical .context-ring {
  border-color: rgba(239, 68, 68, 0.7);
  animation: ring-pulse 0.8s ease-in-out infinite;
}
@keyframes ring-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
</style>
</head>
<body>
<div class="pet-container">
  <div class="pet state-idle" id="pet">
    <div class="pet-body">
      <div class="context-ring"></div>
      <img class="skin-img" id="skin-img" alt="">
      <div class="zzz">💤</div>
    </div>
  </div>
  <div class="status-label" id="status-label">Connecting...</div>
</div>

<script>
const { ipcRenderer } = require('electron');

let config = {};
let abortController = null;
let reconnectTimer = null;
let skinImages = null;
let currentStateKey = 'idle';
let currentImgState = null;

ipcRenderer.on('config', (_, cfg) => {
  config = cfg;
  skinImages = cfg.skinImages || null;
  applySkinState(currentStateKey);
  connectSSE();
});

ipcRenderer.on('skin', (_, images) => {
  skinImages = images || null;
  currentImgState = null;
  applySkinState(currentStateKey);
});

function applySkinState(stateKey) {
  currentStateKey = stateKey;
  if (!skinImages || !skinImages[stateKey]) return;
  if (currentImgState !== stateKey) {
    currentImgState = stateKey;
    document.getElementById('skin-img').src = skinImages[stateKey];
  }
}

async function connectSSE() {
  if (abortController) {
    abortController.abort();
    abortController = null;
  }
  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }

  const base = (config.dashboardUrl || '').replace(/\/+$/, '');
  const url = `${base}/api/stream`;
  const headers = {};
  if (config.sessionToken) {
    headers['Authorization'] = `Bearer ${config.sessionToken}`;
  } else if (config.apiKey) {
    headers['Authorization'] = `Bearer ${config.apiKey}`;
  }

  abortController = new AbortController();

  try {
    const response = await fetch(url, {
      headers,
      signal: abortController.signal,
    });

    if (!response.ok) {
      if (response.status === 401 && config.apiKey) {
        await refreshToken();
        return connectSSE();
      }
      throw new Error(`HTTP ${response.status}`);
    }

    updateLabel('Connected ✓');
    setTimeout(() => updateLabel('Luna'), 2000);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let currentEvent = '';
      let currentData = '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          currentData = line.slice(6);
        } else if (line === '' && currentData) {
          handleSSEEvent(currentEvent, currentData);
          currentEvent = '';
          currentData = '';
        }
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      updateLabel('Reconnecting...');
      scheduleReconnect();
    }
  }
}

async function refreshToken() {
  const result = await ipcRenderer.invoke('save-config', {
    dashboardUrl: config.dashboardUrl,
    apiKey: config.apiKey,
  });
  if (result.ok) {
    config.sessionToken = result.token;
  }
}

function handleSSEEvent(event, data) {
  try {
    const parsed = JSON.parse(data);
    if (event === 'fleet_state') {
      if (parsed.self) updatePetState(parsed.self);
      else updatePetState(parsed);
    } else if (event === 'state_change') {
      updatePetState(parsed);
    }
  } catch {}
}

function scheduleReconnect() {
  if (!reconnectTimer) {
    reconnectTimer = setTimeout(connectSSE, 5000);
  }
}

function updatePetState(data) {
  const pet = document.getElementById('pet');
  const state = (data.state || 'UNKNOWN').toUpperCase();
  const isThinking = state === 'BUSY' && (!data.running_tools || data.running_tools.length === 0);
  const isWaiting = data.source?.pending_permission;

  let stateKey = 'idle';
  let label = 'Luna';

  if (state === 'OFFLINE') {
    stateKey = 'offline';
    label = 'Sleeping...';
  } else if (state === 'STUCK' || state === 'POSSIBLY_STUCK') {
    stateKey = 'stuck';
    label = data.reason || 'Stuck';
  } else if (isWaiting) {
    stateKey = 'waiting';
    label = 'Waiting for you';
  } else if (isThinking) {
    stateKey = 'thinking';
    label = data.reason || 'Thinking...';
  } else if (state === 'BUSY') {
    stateKey = 'busy';
    const tool = data.running_tools?.[0];
    if (tool) {
      const detail = tool.tool_detail ? `: ${tool.tool_detail.slice(0, 20)}` : '';
      label = `${tool.tool_name}${detail}`;
    } else {
      label = 'Working...';
    }
  }

  pet.className = 'pet state-' + stateKey;
  applySkinState(stateKey);
  updateLabel(label);

  // Context gauge
  const contextPct = data.context_pct || 0;
  if (contextPct > 80) {
    pet.classList.add('context-critical');
  } else if (contextPct > 60) {
    pet.classList.add('context-high');
  }

  // Subagent indicator
  const subs = data.active_subagents?.length || 0;
  if (subs > 0 && state === 'BUSY') {
    updateLabel(`Working (${subs} helper${subs > 1 ? 's' : ''})`);
  }
}

function updateLabel(text) {
  document.getElementById('status-label').textContent = text;
}

// Drag support
let isDragging = false;
document.addEventListener('mousedown', () => { isDragging = true; });
document.addEventListener('mouseup', () => { isDragging = false; });
</script>
</body>
</html>
